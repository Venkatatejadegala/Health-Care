version: '3.8'

services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key # IMPORTANT: Change this in production!
    restart: unless-stopped

  ml_microservice:
    build: ./ml-microservice
    container_name: ml_microservice
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped




